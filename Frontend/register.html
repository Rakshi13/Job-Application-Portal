<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">
                JobPortal
            </a>

            <ul class="navbar-nav ms-auto">

                <li class="nav-item mx-2">
                    <a class="nav-link" href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item mx-2">
                    <a class="nav-link" href="login.html">
                        Login
                    </a>
                </li>

            </ul>

        </div>
    </nav>

    <!-- Register Section -->

    <section class="login-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-5">

                    <div class="card shadow border-0 rounded-5 p-5">

                        <h2 class="fw-bold text-center">
                            Create Account 🚀
                        </h2>

                        <p class="text-secondary text-center">
                            Start your journey with us
                        </p>

                        <form>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Full Name
                                </label>

                                <input type="text" class="form-control form-control-lg" placeholder="Enter your name">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Username
                                </label>

                                <input type="text" class="form-control form-control-lg" placeholder="Enter username">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <input type="password" class="form-control form-control-lg"
                                    placeholder="Enter password">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Confirm Password
                                </label>

                                <input type="password" class="form-control form-control-lg"
                                    placeholder="Confirm password">
                            </div>

                            <button class="btn btn-primary btn-lg w-100">
                                Register
                            </button>

                        </form>

                        <hr>

                        <p class="text-center">
                            Already have an account?

                            <a href="login.html" class="text-decoration-none fw-bold">
                                Login
                            </a>
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
