<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employer Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">
                JobPortal
            </a>

            <div class="ms-auto">

                <a href="login.html" class="btn btn-outline-primary">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <!-- Registration Form -->

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h2 class="fw-bold">
                                Employer Registration
                            </h2>

                            <p class="text-secondary">
                                Create your employer account and start posting jobs.
                            </p>

                        </div>

                        <form id="employerForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Company Name
                                </label>

                                <input type="text" id="employer-companyname" class="form-control form-control-lg" placeholder="Enter Company Name"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Company Email
                                </label>

                                <input type="email" id="employer-companyemail" class="form-control form-control-lg" placeholder="company@email.com"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Company Website
                                </label>

                                <input type="text" id="employer-companywebsite" class="form-control form-control-lg"
                                    placeholder="https://company.com">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    HR Contact Person
                                </label>

                                <input type="text" id="employer-hrname" class="form-control form-control-lg" placeholder="HR Name">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input type="text" id="employer-username" class="form-control form-control-lg" placeholder="Choose Username"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password" id="employer-password" class="form-control form-control-lg" placeholder="Password"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input type="password" class="form-control form-control-lg"
                                    placeholder="Confirm Password" required>

                            </div>

                            <div class="d-grid">

                                <button type="submit" id="register-employer" class="btn btn-primary btn-lg">

                                    Register as Employer

                                </button>

                            </div>

                        </form>

                        <hr class="my-4">

                        <div class="text-center">

                            <p>

                                Looking for a Job?

                                <a href="candidate-register.html">
                                    Register as Candidate
                                </a>

                            </p>

                            <p>

                                Already have an account?

                                <a href="login.html">
                                    Login
                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/employee-register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
