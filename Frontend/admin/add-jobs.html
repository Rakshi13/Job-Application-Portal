<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

</head>
<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 bg-dark sidebar">

            <h3 class="text-white text-center mt-4">
                Admin Panel
            </h3>

            <ul class="nav flex-column mt-5">

                <li class="nav-item mb-3">
                    <a href="dashboard.html"
                       class="nav-link text-white">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="manage-jobs.html"
                       class="nav-link text-white">
                        Manage Jobs
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="add-job.html"
                       class="nav-link text-primary fw-bold">
                        Add Job
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#"
                       class="nav-link text-white">
                        Applicants
                    </a>
                </li>

                <li class="nav-item">
                    <a href="../index.html"
                       class="nav-link text-danger">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="col-md-10 p-5">

            <h1 class="fw-bold">
                Add New Job
            </h1>

            <p class="text-secondary">
                Fill in the details below
            </p>

            <div class="card shadow border-0 rounded-4 mt-4 p-5">

                <form>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Job Title
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="Senior Java Developer">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Company Name
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="Google">

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Description
                        </label>

                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Job Description"></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Experience
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="3-5 Years">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Salary
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="20 LPA">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Location
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="Bangalore">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Skills
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   placeholder="Java, Spring Boot, Microservices">

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Job Type
                        </label>

                        <select class="form-select form-select-lg">

                            <option>Remote</option>
                            <option>Hybrid</option>
                            <option>Onsite</option>

                        </select>

                    </div>

                    <button class="btn btn-primary btn-lg">
                        Submit Job
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
