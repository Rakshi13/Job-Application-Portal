<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Candidate Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">
                JobPortal
            </a>

            <div class="ms-auto">

                <a href="login.html" class="btn btn-outline-primary">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <!-- Registration Form -->

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h2 class="fw-bold">
                                Candidate Registration
                            </h2>

                            <p class="text-secondary">
                                Create your account and start applying for jobs.
                            </p>

                        </div>

                        <form id="candidateForm">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        First Name
                                    </label>

                                    <input type="text" class="form-control form-control-lg" placeholder="First Name"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Last Name
                                    </label>

                                    <input type="text" class="form-control form-control-lg" placeholder="Last Name"
                                        required>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email" class="form-control form-control-lg" placeholder="Enter Email"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Mobile Number
                                </label>

                                <input type="tel" class="form-control form-control-lg" placeholder="Enter Mobile Number"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input type="text" class="form-control form-control-lg" placeholder="Choose Username"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password" class="form-control form-control-lg" placeholder="Password"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input type="password" class="form-control form-control-lg"
                                    placeholder="Confirm Password" required>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-primary btn-lg">

                                    Register as Candidate

                                </button>

                            </div>

                        </form>

                        <hr class="my-4">

                        <div class="text-center">

                            <p>

                                Looking to Hire?

                                <a href="employer-register.html">
                                    Register as Employer
                                </a>

                            </p>

                            <p>

                                Already have an account?

                                <a href="login.html">
                                    Login
                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
